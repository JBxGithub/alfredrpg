## 📊 工作流程

### 標準交易流程

```
1. DataForge 獲取市場數據
   ↓ (HTTP POST to SignalForge)
2. SignalForge 分析並生成信號
   ↓ (HTTP POST to TradeForge)
3. TradeForge 風控檢查
   ↓ (條件滿足)
4. TradeForge 執行交易
   ↓ (Webhook to Orchestrator)
5. 呀鬼記錄並監控
   ↓ (WhatsApp 通知主人 - 如需要)
6. 完成
```

### 異常處理流程

```
異常檢測
   ↓
TradeForge 無法處理
   ↓
發送警報給 呀鬼 (Orchestrator)
   ↓
呀鬼評估影響
   ├── 輕微: 記錄日誌，繼續運行
   ├── 嚴重: 暫停交易，通知主人
   └── 緊急: 立即平倉，停止系統
```

