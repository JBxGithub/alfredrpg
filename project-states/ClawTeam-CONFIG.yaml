## 📊 工作流程

### 標準交易流程

```
[DataForge]          [SignalForge]         [TradeForge]         [呀鬼]
     |                      |                      |                |
     |-- 獲取市場數據 ----->|                      |                |
     |                      |-- 分析生成信號 ----->|                |
     |                      |                      |-- 風控檢查     |
     |                      |                      |-- 執行交易     |
     |                      |                      |-- 回報結果 ---->|
     |<-- 更新持倉數據 -----|<-- 更新策略狀態 -----|<-- 確認完成 ---|
```

### 異常處理流程

```
[檢測異常] --> [呀鬼接收] --> [評估影響] --> [決策] --> [執行] --> [回報]
                |                              |
                |-- 輕微: 記錄並繼續            |-- 暫停交易
                |-- 嚴重: 通知主人              |-- 切換模式
                |-- 緊急: 立即止損              |-- 重啟 Agent
```

