# 自適應學習系統配置
# 持續監控、自動優化交易參數

version: "1.0.0"
update_date: "2026-04-23"

# ========== 系統模式 ==========
mode:
  # 運行模式: continuous (持續) / scheduled (定時)
  run_mode: "scheduled"
  
  # 自動調整參數 (危險！建議先觀察再啟用)
  auto_adjust: false
  
  # 調整前確認 (發送通知等待確認)
  confirm_before_adjust: true

# ========== 每日監控設定 ==========
daily_monitoring:
  # 執行時間
  schedule: "08:00"
  
  # 警報閾值
  thresholds:
    max_daily_loss: -2000        # 單日最大虧損 $2000
    max_daily_drawdown: -10      # 單日最大回撤 10%
    max_consecutive_losses: 3    # 最大連續虧損天數
    min_win_rate_weekly: 50      # 週勝率最低 50%
  
  # 自動保護措施
  auto_protection:
    enabled: true
    # 連續虧損3天 -> 減倉50%
    reduce_position_after_consecutive_losses: 
      enabled: true
      days: 3
      reduction: 50  # 減倉 50%
    
    # 單日回撤 > 15% -> 暫停交易
    pause_after_large_drawdown:
      enabled: true
      threshold: -15
      pause_hours: 24

# ========== 每週回顧設定 ==========
weekly_review:
  # 執行時間 (每週一)
  schedule: "monday 09:00"
  
  # 分析週期
  analysis_period: 4  # 過去4週
  
  # 生成建議的條件
  suggestion_thresholds:
    # 回撤過高
    high_drawdown:
      threshold: -70
      suggest_reduce_position: true
      target_position: 85
    
    # 盈利減倉效率
    profit_taking:
      l1_rate_low: 10      # < 10% 建議降低門檻
      l1_rate_high: 50     # > 50% 建議提高門檻
      l2_rate_low: 5       # < 5% 建議降低門檻
      l2_rate_high: 20     # > 20% 建議提高門檻
    
    # 勝率偏低
    low_win_rate:
      threshold: 60
      suggest_raise_threshold: true
      target_long_threshold: 62

# ========== 每月調整設定 ==========
monthly_adjustment:
  # 執行時間 (每月1日)
  schedule: "monthly 10:00"
  
  # 分析週期
  analysis_period: 3  # 過去3個月
  
  # 自動調整條件 (需啟用 auto_adjust)
  auto_adjust_conditions:
    # 回撤持續過高
    sustained_high_drawdown:
      avg_drawdown_threshold: -65
      confidence: 0.8
      action: "reduce_position"
      target: 85
    
    # 勝率持續偏低
    sustained_low_win_rate:
      avg_win_rate_threshold: 65
      confidence: 0.7
      action: "raise_threshold"
      target: 62
    
    # 表現優秀可提升
    excellent_performance:
      avg_drawdown_better_than: -60
      avg_win_rate_better_than: 70
      confidence: 0.75
      action: "increase_position"
      target: 92

# ========== 長期趨勢分析 ==========
long_term_analysis:
  # 啟用長期趨勢分析
  enabled: true
  
  # 分析週期
  lookback_months: 6
  
  # 策略漂移檢測
  strategy_drift_detection:
    enabled: true
    # 勝率下降超過 10% 視為漂移
    win_rate_drop_threshold: 10
    # 回撤惡化超過 15% 視為漂移
    drawdown_worsen_threshold: 15
    
    # 漂移應對
    response:
      # 暫停新倉位
      pause_new_positions: true
      # 通知管理員
      notify_admin: true
      # 啟用保守模式
      enable_conservative_mode: true

# ========== 通知設定 ==========
notifications:
  # 啟用通知
  enabled: true
  
  # 通知渠道
  channels:
    - type: "discord"
      webhook_url: "${DISCORD_WEBHOOK_URL}"
      level: ["warning", "error", "critical"]
    
    - type: "whatsapp"
      enabled: true
      level: ["critical"]
  
  # 通知頻率限制
  rate_limit:
    max_per_hour: 10
    cooldown_minutes: 5

# ========== 參數調整歷史 ==========
adjustment_history:
  # 保存位置
  storage: "database"  # database / file / both
  
  # 最大歷史記錄數
  max_history: 100
  
  # 可回滾 (rollback)
  allow_rollback: true
  rollback_window_days: 7

# ========== 安全限制 ==========
safety_limits:
  # 單次最大調整幅度
  max_single_adjustment: 10  # 百分比
  
  # 每月最大調整次數
  max_adjustments_per_month: 2
  
  # 禁止自動調整的參數 (需手動確認)
  protected_params:
    - "long_stop"
    - "short_stop"
    - "max_position_pct"  # 超過 5% 調整需確認
  
  # 調整後觀察期
  observation_period_days: 7

# ========== 回測驗證 ==========
backtest_validation:
  # 調整前進行回測驗證
  enabled: true
  
  # 回測週期
  backtest_period: "6 months"
  
  # 驗證標準
  criteria:
    min_win_rate: 60
    max_drawdown: -70
    min_sharpe_ratio: 1.0
  
  # 驗證不通過則不應用
  strict_mode: true
