# Alfred Daily Briefing + Dashboard Sync (整合版)
# 檔案位置: cron/alfred-daily-briefing.yaml
# 創建時間: 2026-04-18
# 執行時間: 每日 08:00 (Asia/Hong_Kong)

job_id: "alfred-daily-briefing-v2"
name: "Alfred Daily Briefing + Dashboard Sync"
agent_id: "opencode"
version: "2.0.0"

schedule:
  timezone: "Asia/Hong_Kong"
  cron_expression: "0 8 * * *"  # 每日 08:00
  description: "每日早上 8 點執行整合報告"
  retry_policy:
    max_retries: 3
    retry_interval: 300  # 5分鐘

enabled: true
priority: "high"

notification:
  enabled: true
  targets:
    - type: "whatsapp"
      address: "+85263931048"
      format: "markdown"
      include_timestamp: true

modules:
  dashboard_sync:
    name: "Dashboard Daily Sync"
    enabled: true
    order: 1
    tasks:
      - id: "check_dashboard_status"
        name: "檢查儀表板狀態"
        action: "fetch_url"
        urls:
          - "https://jbxgithub.github.io/alfredrpg/dashboard.html"
          - "http://127.0.0.1:8080"  # FutuTradingBot
          - "http://127.0.0.1:8000/docs"  # DeFi API
        timeout: 30
        
      - id: "update_system_metrics"
        name: "更新系統監控數據"
        action: "collect_metrics"
        metrics:
          - cpu_usage
          - memory_usage
          - disk_usage
          - uptime
          
      - id: "sync_security_results"
        name: "同步安全檢查結果"
        action: "security_scan"
        scan_type: "quick"
        
      - id: "check_component_health"
        name: "檢查組件健康狀況"
        action: "health_check"
        components:
          - gateway
          - whatsapp
          - hooks
          - dashboard
          - fututradingbot
          - defi_dashboard

  daily_briefing:
    name: "Daily Briefing"
    enabled: true
    order: 2
    tasks:
      - id: "read_memory_files"
        name: "讀取記憶文件"
        action: "read_files"
        files:
          - "memory/{YYYY-MM-DD}.md"
          - "MEMORY.md"
          - "project-states/FutuTradingBot-STATUS.md"
          - "HEARTBEAT.md"
          
      - id: "generate_summary"
        name: "生成每日摘要"
        action: "generate_report"
        template: "daily_briefing"
        sections:
          - system_status
          - project_progress
          - yesterday_events
          - today_todos
          - warnings
          - cron_status
          
      - id: "send_notification"
        name: "發送通知"
        action: "send_whatsapp"
        target: "+85263931048"
        format: "structured"

report_format:
  language: "zh-TW"
  emojis: true
  timezone: "Asia/Hong_Kong"
  sections:
    header:
      enabled: true
      template: |
        🤖 **Alfred Daily Briefing**
        📅 {DATE} | ⏰ {TIME} | 📍 {TIMEZONE}
        
    system_status:
      enabled: true
      title: "📊 系統狀態"
      items:
        - AlfredRPG 網站
        - FutuTradingBot
        - DeFi Dashboard
        - AAT v2.0
        - AMS v2.1
        - 呀鬼瀏覽器助手
        
    project_progress:
      enabled: true
      title: "🚀 專案進度"
      
    yesterday_events:
      enabled: true
      title: "📅 昨日重點"
      
    today_todos:
      enabled: true
      title: "🎯 今日待辦"
      priority_levels:
        - P1 (高優先級)
        - P2 (中優先級)
        - P3 (低優先級)
        
    warnings:
      enabled: true
      title: "⚠️ 異常警告"
      
    cron_status:
      enabled: true
      title: "⏰ Cron Job 狀態"
      
    footer:
      enabled: true
      template: |
        ---
        *報告由 Alfred 整合版 Cron Job 生成*
        *下次執行: 明日 08:00*

error_handling:
  on_failure: "notify_admin"
  log_errors: true
  error_notification:
    enabled: true
    target: "+85263931048"
    message: "❌ Alfred Daily Briefing 執行失敗，請檢查日誌"

logging:
  enabled: true
  level: "info"
  retention_days: 30
  output_path: "logs/cron/alfred-daily-briefing/"
