# 富途自動交易機器人配置

# OpenD 網關連接設定
opend:
  host: "127.0.0.1"      # OpenD 監聽地址 (默認本地)
  port: 11111            # OpenD 監聽端口
  timeout: 30            # 連接超時時間（秒）
  websocket_port: 22222  # WebSocket 端口（可選）

# 交易設定
trading:
  env: "SIMULATE"        # 交易環境: SIMULATE (模擬) / REAL (實盤)
  markets:
    - "HK"               # 香港市場
    - "US"               # 美國市場
  unlock_password: ""    # 交易解鎖密碼 (實盤需要，建議使用環境變數)
  
  # 交易時間設定 (香港時間)
  trading_hours:
    hk:
      pre_market: "09:00-09:30"
      regular: "09:30-16:00"
      post_market: "16:00-16:10"
    us:
      pre_market: "17:00-21:30"    # 夏令時需調整
      regular: "21:30-04:00"       # 次日
      post_market: "04:00-08:00"   # 次日

# 日誌設定
logging:
  level: "INFO"                    # 日誌級別: DEBUG/INFO/WARNING/ERROR/CRITICAL
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level} | {name} | {message}"
  console_output: true             # 是否輸出到控制台
  file_output: true                # 是否輸出到文件
  log_dir: "logs"                  # 日誌目錄
  log_file: "trading.log"          # 日誌文件名
  max_size: "10MB"                 # 單個日誌文件最大大小
  backup_count: 5                  # 保留的備份文件數量
  rotation: "00:00"                # 每天午夜輪轉
  retention: "30 days"             # 保留30天的日誌

# 風險控制設定
risk:
  # 倉位控制
  max_position_ratio: 0.8          # 最大持倉比例 (相對於總資金)
  max_single_order_ratio: 0.2      # 單筆最大下單比例
  max_daily_loss_ratio: 0.05       # 日內最大虧損比例
  
  # 止損止盈
  stop_loss_pct: 0.05              # 默認止損比例 (5%)
  take_profit_pct: 0.10            # 默認止盈比例 (10%)
  trailing_stop_pct: 0.03          # 追蹤止損比例
  
  # 訂單限制
  max_open_orders: 10              # 最大未完成訂單數
  max_orders_per_minute: 5         # 每分鐘最大下單數
  
  # 價格保護
  price_limit_pct: 0.05            # 價格偏離保護 (5%)

# 策略設定
strategy:
  default_strategy: "macd_cross"
  update_interval: 60              # 策略更新間隔（秒）
  
  # 訂閱設定
  subscription:
    sub_types:
      - "QUOTE"                   # 報價
      - "TICKER"                  # 逐筆
      - "K_1M"                    # 1分鐘K線
      - "ORDER_BOOK"              # 買賣盤
    
# 通知設定 (可選)
notification:
  enabled: false
  # 支援的通知方式: telegram, email, webhook
  channels:
    - type: "telegram"
      bot_token: ""               # Telegram Bot Token
      chat_id: ""                 # Telegram Chat ID
    - type: "email"
      smtp_server: ""
      smtp_port: 587
      username: ""
      password: ""
      to_address: ""
