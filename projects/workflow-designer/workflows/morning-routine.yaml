name: "晨間例行"
description: "每日早晨自動檢查和通知"
trigger:
  type: cron
  schedule: "0 8 * * *"
  timezone: "Asia/Hong_Kong"

steps:
  - name: check_weather
    action: skill_call
    skill: weather
    params:
      location: "Hong Kong"
    timeout: 30
    
  - name: check_calendar
    action: skill_call
    skill: calendar
    params:
      action: "list_today"
    timeout: 30
    
  - name: check_tasks
    action: skill_call
    skill: task-manager
    params:
      action: "list_pending"
      limit: 5
    timeout: 30
    
  - name: generate_summary
    action: script
    script: |
      weather = steps.check_weather.result
      events = steps.check_calendar.result
      tasks = steps.check_tasks.result
      
      summary = f"""🌅 晨間摘要

🌤️ 天氣: {weather.get('summary', 'N/A')}
🌡️ 溫度: {weather.get('temperature', 'N/A')}°C

📅 今日日程 ({len(events)} 項):
{chr(10).join([f"  • {e['time']} - {e['title']}" for e in events[:3]])}

📝 待辦事項 ({len(tasks)} 項):
{chr(10).join([f"  • {t['title']}" for t in tasks[:3]])}
"""
      return summary
    
  - name: send_notification
    action: notification
    channel: whatsapp
    message: "{{steps.generate_summary.result}}"
    
  - name: log_completion
    action: script
    script: |
      import logging
      from datetime import datetime
      logging.info(f"Morning routine completed at {datetime.now()}")

on_error:
  action: notification
  channel: whatsapp
  message: "⚠️ 晨間例行執行失敗: {{error.message}}"
