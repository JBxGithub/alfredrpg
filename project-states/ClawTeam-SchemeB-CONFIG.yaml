## 📡 通訊協議

### Agent 間通訊

**方式 1: HTTP API (主要)**
```python
# Agent 間直接調用
POST http://localhost:8001/api/v1/data/snapshot
POST http://localhost:8002/api/v1/signal/generate
POST http://localhost:8003/api/v1/trade/execute
```

**方式 2: Webhook (備份)**
```python
# 通過中央指揮轉發
POST http://localhost:9000/webhook/forward
{
  "from": "dataforge",
  "to": "signalforge",
  "message": {...}
}
```

**方式 3: WhatsApp (人工監督)**
- 僅用於重要通知和緊急情況
- 格式: `[Agent名稱] 消息內容`

### 消息格式

```json
{
  "header": {
    "message_id": "uuid",
    "timestamp": "2026-04-04T10:30:00Z",
    "from": "agent_id",
    "to": "agent_id",
    "priority": "high|normal|low"
  },
  "body": {
    "type": "data_update|signal|trade|command|status|alert",
    "payload": {}
  }
}
```

