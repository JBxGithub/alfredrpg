## 🔧 系統配置

### 環境變數
```bash
# ClawTeam 配置
CLAWTEAM_MODE=simulate  # simulate | live
CLAWTEAM_LOG_LEVEL=INFO
CLAWTEAM_DATA_PATH=./data
CLAWTEAM_REPORT_PATH=./reports

# Agent 端點
DATAFORGE_ENDPOINT=http://localhost:8001
SIGNALFORGE_ENDPOINT=http://localhost:8002
TRADEFORGE_ENDPOINT=http://localhost:8003

# Webhook 配置
WEBHOOK_SECRET=your-webhook-secret
WEBHOOK_PORT=9000
```

### 目錄結構
```
clawteam/
├── config/
│   ├── agents.yaml          # Agent 配置
│   ├── skills.yaml          # 技能映射
│   └── protocol.json        # 通訊協議
├── agents/
│   ├── dataforge/           # DataForge Agent
