## 🎯 系統概述

**ClawTeam** 是一個分佈式多 Agent 交易系統，採用中央指揮 + 專業分工架構。

### 核心設計理念
- **單一職責**: 每個 Agent 專注一個核心領域
- **鬆耦合通訊**: 通過標準化消息協議交互
- **容錯設計**: 單點故障不影響整體運作
- **可擴展**: 容易添加新 Agent 或功能模組

