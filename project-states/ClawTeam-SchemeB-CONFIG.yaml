## 🔧 實施步驟

### Step 1: 準備 WhatsApp 號碼

需要為以下號碼配置 OpenClaw:
- ✅ +85263609349 (呀鬼 - 已配置)
- ⏳ +85262255569 (DataForge)
- ⏳ +85262212577 (SignalForge)
- ⏳ +85255086558 (TradeForge)

**配置方法**:
```bash
# 為每個號碼運行配對流程
openclaw channel add whatsapp --phone +85262255569 --name DataForge
openclaw channel add whatsapp --phone +85262212577 --name SignalForge
openclaw channel add whatsapp --phone +85255086558 --name TradeForge
```

### Step 2: 建立 Agent 目錄結構

```bash
# 建立 Agent 配置目錄
mkdir -p ~/.openclaw/agents/{orchestrator,dataforge,signalforge,tradeforge}

# 複製配置文件
cp clawteam/orchestrator-config.json ~/.openclaw/agents/orchestrator/config.json
cp clawteam/dataforge-config.json ~/.openclaw/agents/dataforge/config.json
cp clawteam/signalforge-config.json ~/.openclaw/agents/signalforge/config.json
cp clawteam/tradeforge-config.json ~/.openclaw/agents/tradeforge/config.json
```

### Step 3: 啟動系統

```bash
# 使用 PowerShell 腳本一鍵啟動
.\start-clawteam-schemeB.ps1 -Mode simulate
```

