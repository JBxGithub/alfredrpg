# 六循環系統 V9.4 配置文件
# 最終優化版 - 基於 V9 Asymmetric，優化執行層降低回撤

version: "V9.4_Final"
update_date: "2026-04-23"
description: "90%倉位 + 盈利減倉 + 不對稱交易參數"

# 回測表現 (2019-2024)
backtest_performance:
  total_return: "2060.84%"
  annualized_return: "66.99%"
  max_drawdown: "-64.93%"
  sharpe_ratio: 1.64
  win_rate: "74.2%"
  vs_buy_hold: "+1263.33%"

# ===== 倉位管理 =====
position_management:
  max_position_percent: 90.0  # 90% 倉位上限 (vs V9 原版 95%)
  
# ===== 盈利減倉策略 =====
profit_taking:
  level_1:
    profit_percent: 10.0      # +10%
    reduce_percent: 50.0      # 減倉 50%
  level_2:
    profit_percent: 20.0      # +20%
    reduce_percent: 30.0      # 再減 30%
  # 剩餘 20% 讓利潤奔跑

# ===== 多單參數 (穩健) =====
long_params:
  stop_loss: 3.0              # -3% 止損
  trailing_stop: 3.0          # 回落 -3% 止損
  take_profit: 15.0           # +15% 止盈
  reeval_days: 7              # 7天重估

# ===== 空單參數 (敏捷) =====
short_params:
  stop_loss: 2.0              # +2% 止損 (更嚴格)
  trailing_stop: 2.0          # 反彈 +2% 止損 (更嚴格)
  take_profit: 10.0           # +10% 止盈 (更快)
  reeval_days: 3              # 3天重估 (更頻繁)

# ===== 評分閾值 =====
thresholds:
  long: 60                    # 做多閾值
  short: 40                   # 做空閾值
  continue_long: 60           # 續持多單
  continue_short: 40          # 續持空單

# ===== 通用參數 =====
general:
  cooldown_period: 1          # 1天冷卻期
  commission_rate: 0.001      # 0.1% 佣金
  slippage: 0.001             # 0.1% 滑點

# ===== 交易標的 =====
symbols:
  long: "TQQQ"                # 3倍做多納指
  short: "SQQQ"               # 3倍做空納指
  benchmark: "QQQ"            # 基準指數

# ===== 數據庫配置 =====
database:
  host: "localhost"
  port: 5432
  database: "trading_db"
  user: "postgres"
  password: "PostgresqL"

# ===== 風險限制 =====
risk_limits:
  max_daily_loss_percent: 2.0
  max_total_risk_percent: 4.0
  max_positions: 3

# ===== 文件位置 =====
files:
  backtest: "backtest/backtest_v9_4_final.py"
  trading_engine: "futu-adapter/trading_engine_v9_4.py"
  risk_manager: "decision-engine/risk_manager_v9_4.py"

# ===== 與 V9 原版對比 =====
comparison:
  position_size:
    v9: "95%"
    v9_4: "90%"
    impact: "降低風險敞口"
  
  profit_taking:
    v9: "無"
    v9_4: "+10%減50%, +20%再減30%"
    impact: "鎖定利潤，降低回撤"
  
  stop_loss:
    v9: "對稱 -3%/+3%"
    v9_4: "不對稱 -3%/+2%"
    impact: "空單更敏捷"
  
  take_profit:
    v9: "對稱 +15%/+15%"
    v9_4: "不對稱 +15%/+10%"
    impact: "空單更快獲利"
  
  reeval:
    v9: "對稱 7天/7天"
    v9_4: "不對稱 7天/3天"
    impact: "空單更頻繁評估"

# ===== 改善總結 =====
improvements:
  return_vs_v9: "+94% (2061% vs 1967%)"
  drawdown_vs_v9: "+10% (-65% vs -75%)"
  win_rate_vs_v9: "+21% (74.2% vs 53.3%)"
  sharpe_vs_v9: "-0.43 (1.64 vs 2.07)"
