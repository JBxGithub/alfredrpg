## 🔐 安全與權限

### Agent 權限矩陣

| Agent | 數據讀取 | 信號生成 | 交易執行 | 系統控制 |
|-------|---------|---------|---------|---------|
| 呀鬼 | ✅ | ✅ | ✅ | ✅ |
| DataForge | ✅ | ❌ | ❌ | ❌ |
| SignalForge | ✅ | ✅ | ❌ | ❌ |
| TradeForge | ✅ | ✅ | ✅ | ❌ |

### 模式切換

- **SIMULATE 模式**: 所有交易為模擬，不影響真實資金
- **LIVE 模式**: 真實交易，需雙重確認

### 安全規則

1. 未經呀鬼批准，SignalForge 不能直接命令 TradeForge
2. TradeForge 在 LIVE 模式下每日交易上限需設定
3. 所有交易記錄必須寫入不可篡改的 Log
4. 異常行為自動觸發警報並暫停系統

