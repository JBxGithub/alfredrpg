## 🚀 快速啟動

### 啟動整個系統
```powershell
.\start-clawteam-schemeB.ps1 -Agent all -Mode simulate
```

### 啟動單個 Agent
```powershell
.\start-clawteam-schemeB.ps1 -Agent dataforge
.\start-clawteam-schemeB.ps1 -Agent signalforge
.\start-clawteam-schemeB.ps1 -Agent tradeforge
```

### 查看狀態
```powershell
.\start-clawteam-schemeB.ps1 -Status
```

### 停止系統
```powershell
.\start-clawteam-schemeB.ps1 -Stop
```

