<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw Dashboard - Security</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06080e;--bg2:#0a0d14;--card:#0d1117;--border:#1a1f2e;
  --text:#e6edf3;--text2:#8b949e;--accent:#7c5cfc;--accent2:#a78bfa;
  --green:#2dd4a0;--yellow:#f5a623;--red:#f85149;--blue:#58a6ff;
  --glass:rgba(13,17,23,0.7);--glow:rgba(124,92,252,0.15);
  --font:'Outfit',system-ui,sans-serif;--mono:'Space Mono',monospace;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;padding:20px}
.container{max-width:1280px;margin:0 auto}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 0 24px;border-bottom:1px solid var(--border);margin-bottom:24px}
.logo{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.glass-card{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px}
.card-title{font-weight:700;font-size:1rem;margin-bottom:12px}
.card-sub{font-size:.82rem;color:var(--text2);margin-bottom:10px}
.score-circle{width:120px;height:120px;position:relative}
.score-value{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-number{font-size:32px;font-weight:700}
.score-label{font-size:12px;color:var(--text2)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:999px;font-size:.72rem;font-weight:600;text-transform:uppercase;margin-right:8px}
.badge-done{background:rgba(45,212,160,0.15);color:var(--green);border:1px solid rgba(45,212,160,0.25)}
.badge-in-progress{background:rgba(88,166,255,0.15);color:var(--blue);border:1px solid rgba(88,166,255,0.25)}
.badge-failed{background:rgba(248,81,73,0.15);color:var(--red);border:1px solid rgba(248,81,73,0.25)}
.warning-item{background:rgba(69,26,3,0.5);border-left:4px solid var(--yellow);padding:12px 16px;margin-bottom:8px;border-radius:0 8px 8px 0}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.refresh-btn{color:var(--accent);text-decoration:none;font-size:.85rem;border:1px solid var(--border);padding:6px 14px;border-radius:999px;transition:all .2s;background:transparent;cursor:pointer;font-family:var(--font)}
.refresh-btn:hover{background:var(--glow);border-color:var(--accent)}
.system-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;font-family:var(--mono);font-size:.82rem;color:var(--text2)}
.system-grid span{color:var(--text)}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">OpenClaw Dashboard</div>
    <button class="refresh-btn" onclick="loadSecurityData()">Refresh</button>
  </header>

  <!-- Score Card -->
  <div class="glass-card">
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
      <div class="score-circle">
        <svg viewBox="0 0 100 100" style="width:100%;height:100%;transform:rotate(-90deg)">
          <circle cx="50" cy="50" r="45" fill="none" stroke="#1a1f2e" stroke-width="8"/>
          <circle id="securityScoreCircle" cx="50" cy="50" r="45" fill="none" stroke="#22c55e" stroke-width="8" stroke-dasharray="283" stroke-dashoffset="0" stroke-linecap="round"/>
        </svg>
        <div class="score-value">
          <div id="securityScoreValue" class="score-number" style="color:#22c55e">-</div>
          <div id="securityScoreLabel" class="score-label">-</div>
        </div>
      </div>
      <div style="flex:1">
        <div class="card-title">Security Score</div>
        <div class="card-sub">Last updated: <span id="securityLastUpdated">-</span></div>
        <div>
          <span class="badge badge-done"><span id="securitySkillsCount">0</span> Skills</span>
          <span class="badge badge-in-progress"><span id="securityFilesCount">0</span> Files</span>
          <span class="badge badge-failed"><span id="securityIssuesCount">0</span> Issues</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Warnings -->
  <div class="glass-card">
    <div class="card-title">Security Warnings</div>
    <div id="securityWarnings"><div class="empty-state">Loading...</div></div>
  </div>

  <!-- Component Status -->
  <div class="glass-card">
    <div class="card-title">Component Status</div>
    <div id="securityComponentStatus"><div class="empty-state">Loading...</div></div>
  </div>

  <!-- System Info -->
  <div class="glass-card">
    <div class="card-title">System Information</div>
    <div id="securitySystemInfo" class="system-grid">Loading...</div>
  </div>
</div>

<script>
async function loadSecurityData() {
  console.log('Loading security data...');
  
  try {
    const res = await fetch('security-data.json?t=' + Date.now());
    console.log('Response:', res.status);
    
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    console.log('Data:', data);
    
    // Score
    const score = data.securityScore || { value: 0, label: 'Unknown', color: '#6b7280' };
    document.getElementById('securityScoreValue').textContent = score.value;
    document.getElementById('securityScoreValue').style.color = score.color;
    document.getElementById('securityScoreLabel').textContent = score.label;
    document.getElementById('securityScoreLabel').style.color = score.color;
    
    // Circle
    const offset = 283 - (283 * score.value / 100);
    const circle = document.getElementById('securityScoreCircle');
    circle.style.strokeDashoffset = offset;
    circle.style.stroke = score.color;
    
    // Metadata
    document.getElementById('securityLastUpdated').textContent = new Date(data.lastUpdated).toLocaleString();
    document.getElementById('securitySkillsCount').textContent = data.skillsScanned || 0;
    document.getElementById('securityFilesCount').textContent = data.filesScanned || 0;
    document.getElementById('securityIssuesCount').textContent = data.issuesFound || 0;
    
    // Warnings
    renderWarnings(data.activeWarnings);
    
    // Components
    renderComponents(data.componentStatus);
    
    // System Info
    renderSystemInfo(data.systemInfo);
    
  } catch (e) {
    console.error('Error:', e);
    document.getElementById('securityWarnings').innerHTML = '<div class="empty-state" style="color:#f85149">Error: ' + e.message + '</div>';
  }
}

function renderWarnings(warnings) {
  const container = document.getElementById('securityWarnings');
  if (!warnings || Object.keys(warnings).length === 0) {
    container.innerHTML = '<div class="empty-state">No warnings found</div>';
    return;
  }
  
  const colors = { CRITICAL: '#dc2626', HIGH: '#f97316', MEDIUM: '#eab308', LOW: '#3b82f6', INFO: '#6b7280' };
  let html = '';
  
  for (const [severity, issues] of Object.entries(warnings)) {
    if (!issues || issues.length === 0) continue;
    html += '<div style="margin-bottom:12px"><strong style="color:' + colors[severity] + '">' + severity + '</strong> (' + issues.length + ')';
    for (const issue of issues.slice(0, 3)) {
      html += '<div class="warning-item" style="border-left-color:' + colors[severity] + '">';
      html += '<div style="font-weight:600">' + issue.ruleName + '</div>';
      html += '<div style="font-size:.8rem;color:var(--text2)">' + issue.file + '</div>';
      html += '</div>';
    }
    if (issues.length > 3) html += '<div style="font-size:.8rem;color:var(--text2)">... and ' + (issues.length - 3) + ' more</div>';
    html += '</div>';
  }
  
  container.innerHTML = html || '<div class="empty-state">No warnings</div>';
}

function renderComponents(components) {
  const container = document.getElementById('securityComponentStatus');
  if (!components) {
    container.innerHTML = '<div class="empty-state">No data</div>';
    return;
  }
  
  let html = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px">';
  for (const [name, status] of Object.entries(components)) {
    html += '<div class="glass-card" style="padding:12px;display:flex;align-items:center;gap:8px">';
    html += '<span style="width:10px;height:10px;border-radius:50%;background:' + (status.color || '#6b7280') + '"></span>';
    html += '<div><div style="font-weight:600">' + name + '</div><div style="font-size:.75rem;color:var(--text2)">' + status.label + '</div></div>';
    html += '</div>';
  }
  html += '</div>';
  container.innerHTML = html;
}

function renderSystemInfo(info) {
  const container = document.getElementById('securitySystemInfo');
  if (!info) {
    container.innerHTML = 'No data';
    return;
  }
  
  let html = '';
  html += '<div>Platform: <span>' + info.platform + ' (' + info.arch + ')</span></div>';
  html += '<div>Node: <span>' + info.nodeVersion + '</span></div>';
  html += '<div>OpenClaw: <span>' + info.openclawVersion + '</span></div>';
  html += '<div>Dashboard: <span>' + info.dashboardVersion + '</span></div>';
  html += '<div>Workspace: <span>' + info.workspace + '</span></div>';
  html += '<div>Uptime: <span>' + Math.floor(info.uptime / 3600) + 'h</span></div>';
  html += '<div>Skills Dir: <span>' + info.skillsDir + '</span></div>';
  html += '<div>System Skills: <span>' + info.systemSkillsDir + '</span></div>';
  html += '<div>Total Env: <span>' + info.totalEnvVars + '</span></div>';
  html += '<div>Sensitive Env: <span>' + info.sensitiveEnvVars + '</span></div>';
  container.innerHTML = html;
}

// Load on page load
loadSecurityData();
</script>
</body>
</html>
