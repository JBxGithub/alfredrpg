## 📈 監控指標

### 系統健康指標
- Agent 心跳狀態 (每 30 秒)
- 數據延遲 (目標 < 1 秒)
- 消息隊列長度
- 錯誤率

### 交易指標
- 今日交易次數
- 當前持倉 PnL
- 勝率統計
- 風險敞口

### 性能指標
- API 調用次數
- 響應時間
- 記憶體使用
- CPU 負載

