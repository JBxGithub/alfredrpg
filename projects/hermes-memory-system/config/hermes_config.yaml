# Hermes Memory System Configuration
# Windows Edition

# 系統路徑配置
paths:
  # 基礎工作目錄 (使用 Windows 路徑格式)
  workspace: "~\\openclaw_workspace"
  
  # 記憶文件存儲路徑
  memory_dir: "~\\openclaw_workspace\\memory"
  memory_file: "~\\openclaw_workspace\\MEMORY.md"
  user_file: "~\\openclaw_workspace\\USER.md"
  
  # 會話數據庫路徑
  sessions_dir: "~\\openclaw_workspace\\data\\sessions"
  database_file: "~\\openclaw_workspace\\data\\sessions\\hermes_sessions.db"
  
  # 技能存儲路徑
  skills_dir: "~\\openclaw_workspace\\skills"
  
  # 日誌路徑
  logs_dir: "~\\openclaw_workspace\\logs"

# 記憶限制配置
memory_limits:
  # MEMORY.md 字符限制
  memory_max_chars: 2200
  
  # USER.md 字符限制
  user_max_chars: 1375
  
  # 壓縮閾值 (達到多少比例時觸發壓縮)
  compression_threshold: 0.9
  
  # 保留最新記憶條數 (壓縮時)
  keep_recent_memories: 10

# 會話存儲配置
session_store:
  # SQLite 配置
  sqlite:
    # 數據庫超時 (秒)
    timeout: 30
    # 是否啟用 WAL 模式
    wal_mode: true
    # 緩存大小 (頁數)
    cache_size: 2000
  
  # FTS5 配置
  fts5:
    # 分詞器
    tokenizer: "porter"
    # 是否存儲原始內容
    contentless: false
  
  # 摘要配置
  summarization:
    # 使用 Gemini Flash
    enabled: true
    # Gemini API Key (從環境變量讀取優先)
    api_key: "${GEMINI_API_KEY}"
    # 摘要觸發閾值 (會話消息數)
    summary_threshold: 10
    # 摘要最大長度
    max_summary_length: 500

# 技能系統配置
skills:
  # 技能文件格式
  format: "markdown"
  
  # 技能文件名模板
  filename_template: "{name}\\SKILL.md"
  
  # 漸進式披露配置
  progressive_disclosure:
    # 啟用漸進式披露
    enabled: true
    # 初始顯示層級
    initial_level: 1
    # 最大層級
    max_level: 3
  
  # 自動創建技能配置
  auto_creation:
    # 啟用自動創建
    enabled: true
    # 複雜度閾值 (任務步驟數)
    complexity_threshold: 5
    # 任務持續時間閾值 (分鐘)
    duration_threshold: 15
    # 是否包含代碼示例
    include_code: true
    # 是否包含錯誤處理
    include_errors: true

# 自適應學習配置
learning:
  # 技能改進配置
  skill_improvement:
    # 啟用技能改進
    enabled: true
    # 使用次數閾值 (達到後觸發改進分析)
    usage_threshold: 3
    # 改進分析間隔 (天)
    analysis_interval: 7
  
  # 提醒系統配置 (Nudges)
  nudges:
    # 啟用提醒
    enabled: true
    # 提醒類型
    types:
      - "memory_review"      # 記憶回顧
      - "skill_practice"     # 技能練習
      - "knowledge_persist"  # 知識持久化
    # 提醒頻率
    frequency: "daily"
    # 提醒時間 (24小時制)
    time: "09:00"
    # 提醒內容最大長度
    max_content_length: 200

# Windows 特定配置
windows:
  # PowerShell 配置
  powershell:
    # 執行策略
    execution_policy: "RemoteSigned"
    # 是否加載用戶配置文件
    load_profile: true
  
  # Task Scheduler 配置
  task_scheduler:
    # 任務名稱前綴
    task_prefix: "Hermes_"
    # 任務描述
    task_description: "Hermes Memory System Automated Task"
    # 運行用戶 (SYSTEM 或當前用戶)
    run_as: "CURRENT_USER"
    # 是否在用戶登錄時運行
    run_on_login: true
    # 是否隱藏窗口
    hidden: true
  
  # 路徑處理配置
  paths:
    # 支持長路徑
    long_path_support: true
    # 環境變量擴展
    expand_env_vars: true
    # 路徑分隔符 (自動檢測)
    separator: "auto"

# 日誌配置
logging:
  # 日誌級別
  level: "INFO"
  # 日誌格式
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  # 日誌文件最大大小 (MB)
  max_size: 10
  # 保留的日誌文件數
  backup_count: 5
  # 是否輸出到控制台
  console_output: true

# 性能配置
performance:
  # 數據庫連接池大小
  db_pool_size: 5
  # 並發線程數
  max_workers: 4
  # 緩存大小 (條目數)
  cache_size: 1000
  # 是否啟用壓縮
  enable_compression: true
