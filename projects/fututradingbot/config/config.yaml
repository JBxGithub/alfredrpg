# Futu Trading Bot Configuration
# 富途交易機器人配置文件

# ============================================================================
# Application Settings
# ============================================================================
app:
  name: "FutuTradingBot"
  version: "1.0.0"
  environment: "development"  # development | production | testing
  debug: false
  timezone: "Asia/Hong_Kong"

# ============================================================================
# Futu OpenAPI Configuration
# ============================================================================
futu:
  # API Connection Settings
  host: "127.0.0.1"
  port: 11111  # Futu OpenD default port
  
  # Authentication (use environment variables for sensitive data)
  # Set FUTU_UNLOCK_PASSWORD in .env file
  unlock_password: ${FUTU_UNLOCK_PASSWORD}
  
  # Trading Account
  # Set FUTU_TRD_ACCOUNT in .env file
  trd_account: ${FUTU_TRD_ACCOUNT}
  
  # Market Connection
  markets:
    - "HK"      # Hong Kong Stock Exchange
    - "US"      # US Stock Exchange
    - "SH"      # Shanghai Stock Exchange
    - "SZ"      # Shenzhen Stock Exchange
  
  # Connection Retry Settings
  retry:
    max_attempts: 5
    delay_seconds: 2
    backoff_multiplier: 1.5

# ============================================================================
# Trading Settings
# ============================================================================
trading:
  # Default Order Settings
  default_order_type: "NORMAL"  # NORMAL | MARKET | LIMIT
  default_trd_env: "SIMULATE"   # SIMULATE | REAL
  
  # Risk Management
  risk_management:
    enabled: true
    config_path: "./config/risk_config.json"  # 風控配置文件路徑
    
    # 倉位風控
    position_limits:
      max_single_position_value: 100000      # 單一股票最大倉位價值
      max_single_position_percent: 20.0      # 單一股票最大倉位佔比(%)
      max_total_position_value: 500000       # 總倉位上限
      max_total_position_percent: 80.0       # 總倉位佔資金比例上限(%)
      max_sector_concentration_percent: 40.0 # 行業集中度上限(%)
    
    # 交易風控
    trade_limits:
      max_daily_trades: 20                   # 每日最大交易次數
      max_order_value: 50000                 # 單筆最大金額
      max_order_quantity: 1000               # 單筆最大股數
      price_volatility_threshold: 5.0        # 價格波動異常閾值(%)
      price_spike_threshold: 10.0            # 價格暴漲暴跌閾值(%)
    
    # 資金風控
    capital_limits:
      max_daily_loss: 50000                  # 每日最大虧損限制
      max_drawdown_percent: 10.0             # 最大回撤警告(%)
      max_drawdown_percent_hard: 15.0        # 強制停止回撤(%)
      margin_warning_percent: 80.0           # 保證金警告閾值(%)
      margin_critical_percent: 90.0          # 保證金危險閾值(%)
    
    # 控制開關
    controls:
      enable_position_risk: true
      enable_trade_risk: true
      enable_capital_risk: true
      auto_stop_on_critical: true            # 嚴重風險時自動停止交易
  
  # Strategy Settings
  strategy:
    default_strategy: "ma_crossover"
    check_interval_seconds: 60
    
    # Moving Average Crossover Settings
    ma_crossover:
      short_window: 10
      long_window: 30
      
    # RSI Settings
    rsi:
      period: 14
      overbought: 70
      oversold: 30

# ============================================================================
# Data Settings
# ============================================================================
data:
  # Historical Data Storage
  storage_path: "./data"
  
  # Database
  database:
    type: "sqlite"
    path: "./data/trading.db"
    
  # Data Retention
  retention_days: 365
  
  # Real-time Data
  realtime:
    subscribe_quotes: true
    subscribe_order_book: true
    subscribe_broker_queue: false
    subscribe_tick: false

# ============================================================================
# Logging Settings
# ============================================================================
logging:
  level: "INFO"  # DEBUG | INFO | WARNING | ERROR | CRITICAL
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level: <8} | {name}:{function}:{line} | {message}"
  
  # File Logging
  file:
    enabled: true
    path: "./logs"
    filename: "futu_trading_{time:YYYYMMDD}.log"
    rotation: "1 day"
    retention: "30 days"
    compression: "zip"
    
  # Console Logging
  console:
    enabled: true
    colorize: true
    
  # Error Logging (separate file for errors)
  error_file:
    enabled: true
    filename: "futu_trading_errors_{time:YYYYMMDD}.log"

# ============================================================================
# Web Dashboard Settings
# ============================================================================
web:
  enabled: true
  host: "0.0.0.0"
  port: 8080
  
  # Security
  auth:
    enabled: false
    username: ${WEB_USERNAME:admin}
    password: ${WEB_PASSWORD:admin}
  
  # CORS
  cors:
    allowed_origins:
      - "http://localhost:3000"
      - "http://localhost:8080"

# ============================================================================
# Monitoring Settings
# ============================================================================
monitoring:
  enabled: true
  
  # 指標收集
  metrics:
    enabled: true
    retention_hours: 24                    # 指標保留時間
    collect_interval_seconds: 10           # 收集間隔
  
  # 警報設置
  alerts:
    enabled: true
    dedup_window_minutes: 5                # 警報去重時間窗口
    
    # 警報級別配置
    levels:
      critical: ["console", "file", "telegram", "email"]
      error: ["console", "file", "telegram"]
      warning: ["console", "file"]
      info: ["console"]
    
    # Telegram 警報
    telegram:
      enabled: false
      bot_token: ${TELEGRAM_BOT_TOKEN}
      chat_id: ${TELEGRAM_CHAT_ID}
    
    # Email 警報
    email:
      enabled: false
      smtp_host: "smtp.gmail.com"
      smtp_port: 587
      username: ${EMAIL_USERNAME}
      password: ${EMAIL_PASSWORD}
      to_address: ${EMAIL_TO_ADDRESS}
    
    # Webhook 警報
    webhook:
      enabled: false
      url: ${ALERT_WEBHOOK_URL}
  
  # 審計日誌
  audit:
    enabled: true
    log_dir: "./logs/audit"
    retention_days: 90

# ============================================================================
# Notification Settings (Legacy)
# ============================================================================
notifications:
  # Telegram Notifications
  telegram:
    enabled: false
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
    
  # Email Notifications
  email:
    enabled: false
    smtp_host: "smtp.gmail.com"
    smtp_port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    to_address: ${EMAIL_TO_ADDRESS}

# ============================================================================
# Watchlist - Default Stocks to Monitor
# ============================================================================
watchlist:
  hk:
    - "00700"   # Tencent
    - "09988"   # Alibaba
    - "03690"   # Meituan
    - "01810"   # Xiaomi
  us:
    - "AAPL"    # Apple
    - "TSLA"    # Tesla
    - "NVDA"    # NVIDIA
    - "MSFT"    # Microsoft
  sh:
    - "600519"  # Kweichow Moutai
  sz:
    - "000858"  # Wuliangye
