## 🔐 安全與權限

### Agent 權限矩陣

| 操作 | 呀鬼 | DataForge | SignalForge | TradeForge |
|------|------|-----------|-------------|------------|
| 讀取市場數據 | ✅ | ✅ | ✅ | ✅ |
| 生成交易信號 | ✅ | ❌ | ✅ | ❌ |
| 執行交易 | ✅ | ❌ | ❌ | ✅ |
| 修改策略參數 | ✅ | ❌ | ✅ | ❌ |
| 系統控制 | ✅ | ❌ | ❌ | ❌ |
| 查看持倉 | ✅ | ✅ | ✅ | ✅ |

### 模式切換

**SIMULATE 模式** (默認):
- 所有交易為模擬
- 無資金風險
- 用於測試和驗證

**LIVE 模式** (需明確切換):
- 真實資金交易
- 需要雙重確認
- 每日交易次數限制

