## 📡 通訊協議

### 消息格式標準

所有 Agent 間通訊使用統一 JSON 格式：

```json
{
  "header": {
    "message_id": "uuid",
    "timestamp": "ISO8601",
    "from": "agent_id",
    "to": "agent_id or 'broadcast'",
    "priority": "high|normal|low"
  },
  "body": {
    "type": "data_update|signal|trade|command|status|alert",
    "payload": {}
  },
  "meta": {
    "requires_ack": true,
    "ttl_seconds": 300
  }
}
```

### 通訊渠道

1. **WhatsApp Group** (TradingBotGroup): 人工監督與緊急通訊
2. **Webhook 系統**: Agent 間自動化通訊
3. **本地 WebSocket**: 實時數據流
4. **Log 檔案**: 持久化記錄

### 指令集

#### 中央指揮指令
```yaml
commands:
  - name: "system.status"
    description: "查詢全系統狀態"
    target: "all"
    
  - name: "agent.ping"
    description: "心跳檢測"
    target: "specific"
    
  - name: "data.refresh"
    description: "強制刷新數據"
    target: "DataForge"
    
  - name: "signal.generate"
    description: "生成交易信號"
    target: "SignalForge"
    
  - name: "trade.execute"
    description: "執行交易"
    target: "TradeForge"
    
  - name: "mode.switch"
    description: "切換模式 (simulate/live)"
    target: "TradeForge"
```

